<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería de Imágenes</title>
  <link rel="stylesheet" href="gallery-styles.css">
</head>
<body>
  <!-- Fondo animado similar al original -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="container">
    <header class="gallery-header">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
        </svg>
      </div>
      <h1>¡Datos enviados correctamente!</h1>
    </header>

    <div class="gallery-container">
      <div class="parent">
        <div class="div1 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145757.png" alt="Imagen 1" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">1</span>
          </div>
        </div>
        <div class="div2 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145809.png" alt="Imagen 2" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">2</span>
          </div>
        </div>
        <div class="div3 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145828.png" alt="Imagen 3" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">3</span>
          </div>
        </div>
        <div class="div4 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145839.png" alt="Imagen 4" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">4</span>
          </div>
        </div>
        <div class="div5 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145925.png" alt="Imagen 5" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">5</span>
          </div>
        </div>
        <div class="div6 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145935.png" alt="Imagen 6" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">6</span>
          </div>
        </div>
        <div class="div7 image-card">
          <img src="images/Captura de pantalla 2026-03-03 145955.png" alt="Imagen 7" loading="lazy">
          <div class="image-overlay">
            <span class="image-number">7</span>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button onclick="window.history.back()" class="btn btn-ghost">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Volver al formulario
      </button>
      <button onclick="window.location.href='index.html'" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Ir al inicio
      </button>
    </div>
  </main>

  <script src="gallery-script.js"></script>
</body>
</html>
